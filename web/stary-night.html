<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stary Night</title>
    <style>
        :root {
            color-scheme: light dark;
            --font-color: #212121;
        }

        @media (prefers-color-scheme:dark) {
            :root {
                --font-color: #f8f8ff;
            }
        }

        #board {
            width: calc(100vw - 20px);
            height: calc(100vh - 20px);
        }

        #shootingStar {
            fill: var(--font-color);
            animation: shooting 5s ease-in-out forwards;
        }

        @keyframes shooting {
            0% {
                transform: rotateZ(-45deg);
            }

            100% {
                transform: translate(100%, 50%);
            }
        }
    </style>
</head>

<body>
    <main>
        <svg id="board" width="90%" height="90%">
            <circle id="shootingStar" cx="100" cy="100" r="2.5" />
        </svg>
    </main>
    <script>
        onload = () => {
            // Generate 250 stars for the night effect
            for (i = 0; i < 500; i++) {
                const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                dot.setAttribute('id', `circle-${i}`);
                dot.setAttribute('style', 'fill:var(--font-color)');
                dot.setAttribute('r', Math.random());
                dot.setAttribute('cx', Math.random() * window.innerWidth);
                dot.setAttribute('cy', Math.random() * window.innerHeight);
                board.appendChild(dot);
            }
        };
    </script>
