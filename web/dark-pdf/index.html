<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convert PDFs to Dark Mode - Offline</title>

  <script src="pdf.js"></script>
  <script>pdfjsLib.GlobalWorkerOptions.workerSrc = "pdf.worker.js";</script>
  <script src="pdf-lib.js" defer></script>

  <style>
    :root {
      color-scheme: dark light;
    }

    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      text-align: center;
      font-family: Arial, sans-serif;
    }

    #fileInput {
      display: none;
    }

    #uploadContainer {
      position: absolute;
      top: 100px;
      left: 100px;
      right: 100px;
      bottom: 100px;
      cursor: pointer;
      font-size: 10em;
      border: 2px dashed;
      border-radius: 16px;
      align-content: center;
    }

    #downloadBtn {
      display: none;
      cursor: pointer;
      position: absolute;
      top: 30px;
      right: 30px;
      font-size: 2em;
      border-radius: 8px;
      background-color: transparent;
    }

    #pdfContainer {
      width: 90%;
      margin: 0 auto;
    }

    canvas {
      width: 100%;
      border: 1px solid;
      border-radius: 16px;
    }

    #progressContainer {
      display: none;
      width: 90%;
      max-width: 90%;
      padding: 10px;
      margin: 20px auto;
      text-align: center;
    }

    #progressBar {
      width: 0;
      height: 20px;
      line-height: 20px;
      background-color: dodgerblue;
      transition: width 0.3s ease-in-out;
    }

    #progressText {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <main>
    <h1>PDF Dark Mode Converter</h1>
    <input type="file" id="fileInput" accept="application/pdf">
    <label for="fileInput" id="uploadContainer">⊕</label>
    <button id="downloadBtn">⬇︎</button>
    <div id="progressContainer">
      <div id="progressBar"></div>
      <div id="progressText">0/0</div>
    </div>
    <div id="pdfContainer"></div>
  </main>

  <script>
    let modifiedPdfBytes;
    let originalFileName = "";

    function handleFile(file) {
      originalFileName = file.name.replace(/\.pdf$/i, "");
      const fileReader = new FileReader();
      fileReader.onload = async function () {
        await renderPDF(new Uint8Array(this.result));
      };
      fileReader.readAsArrayBuffer(file);
    }

    document.body.ondragover = (event) => event.preventDefault();

    document.body.ondrop = (event) => {
      event.preventDefault();
      if (event.dataTransfer.files.length > 0) {
        handleFile(event.dataTransfer.files[0]);
      }
    };

    document.getElementById("fileInput").onchange = ({ target: { files } }) => {
      if (files.length > 0) handleFile(files[0]);
    };

    async function renderPDF(pdfData) {
      const pdfDoc = await PDFLib.PDFDocument.create();
      const pdf = await pdfjsLib.getDocument({ data: pdfData }).promise;

      const progressContainer = document.getElementById("progressContainer");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const pdfContainer = document.getElementById("pdfContainer");
      const downloadBtn = document.getElementById("downloadBtn");
      const uploadContainer = document.getElementById("uploadContainer");

      const scale = parseFloat(window.prompt("Scale: (1-5)", 1));
      const startPage = parseInt(window.prompt("Start page number: ", 1));
      const endPage = parseInt(window.prompt("End page number: ", pdf.numPages));

      if (endPage < startPage) return;

      uploadContainer.style.display = "none";
      progressContainer.style.display = "block";

      for (let i = startPage; i <= endPage; i++) {
        progressBar.style.width = `${i / pdf.numPages * 100}%`;
        progressText.innerText = (i === pdf.numPages)
          ? "Finalizing... Almost done!"
          : `${i}/${pdf.numPages}`;

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale });
        const canvas = document.createElement("canvas");
        const canvasContext = canvas.getContext("2d");

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        await page.render({ canvasContext, viewport }).promise;

        // Apply dark mode effect
        const imageData = canvasContext.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let j = 0; j < data.length; j += 4) {
          data[j] = 255 - data[j]; // Red
          data[j + 1] = 255 - data[j + 1]; // Green
          data[j + 2] = 255 - data[j + 2]; // Blue
        }

        canvasContext.putImageData(imageData, 0, 0);
        pdfContainer.appendChild(canvas);

        // Convert modified canvas to PNG and add to PDF
        const imgBytes = await new Promise((resolve) => {
          canvas.toBlob((blob) => blob.arrayBuffer().then(resolve), "image/png")
        });
        const jpgImage = await pdfDoc.embedPng(imgBytes);
        const newPage = pdfDoc.addPage([viewport.width, viewport.height]);
        newPage.drawImage(jpgImage, {
          x: 0, y: 0,
          width: viewport.width,
          height: viewport.height,
        });
      }

      modifiedPdfBytes = await pdfDoc.save();
      progressContainer.style.display = "none";
      downloadBtn.style.display = "inline-block";
      // triggerDownload(); // auto-download
    }

    function triggerDownload() {
      if (!modifiedPdfBytes) return;
      const blob = new Blob([modifiedPdfBytes], { type: "application/pdf" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${originalFileName}_dark_mode.pdf`;
      link.click();
      downloadBtn.style.display = "none";
    }

    downloadBtn.onclick = triggerDownload;
  </script>
</body>

</html>
