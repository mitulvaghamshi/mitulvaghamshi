<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Themed Website</title>
    <style>
        :root {
            color-scheme: light dark;
            --background: #f4f5ff;
            --card-color: #e0e7ff;
            --font-color: #303030;
            --title-color: #fffae4;
            --subtitle-color: #daffdc;
        }

        @media (prefers-color-scheme:dark) {
            :root {
                --background: #2b2b2b;
                --card-color: #3b3b3b;
                --font-color: #f6f9ff;
                --title-color: #464646;
                --subtitle-color: #222222;
            }
        }

        body {
            margin: auto;
            padding: 10px;
            text-align: center;
            color: var(--font-color);
            background-color: var(--background);
        }

        a {
            margin: 10px;
            padding: 10px;
            max-width: 30%;
            min-width: 20%;
            font-size: 1.5rem;
            border-radius: 4px;
            display: inline-block;
            color: var(--font-color);
            background-color: var(--card-color);
        }

        a:visited {
            background-color: var(--title-color);
        }

        a:hover {
            background-color: var(--subtitle-color);
        }

        .title,
        .headline {
            margin: 10px;
            border-radius: 4px;
            font-weight: bolder;
        }

        .title {
            padding: 20px 10px;
            font-size: xx-large;
            background-color: var(--title-color);
        }

        .headline {
            padding: 15px;
            font-size: large;
            background-color: var(--subtitle-color);
        }
    </style>
</head>

<body>
    <h1 class="title">Hello World!</h1>
    <p class="headline">Create Light Dark Themes for your website.</p>
    <a>1</a><a>2</a><a>3</a><a>4</a><a>5</a><a>6</a><a>7</a><a>8</a><a>9</a><a>10</a><a>11</a><a>12</a><a>13</a><a>14</a><a>15</a><a>16</a><a>17</a><a>18</a>
</body>

</html>
