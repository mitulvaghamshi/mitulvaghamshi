    - assets/moon.webp
    - assets/neptune.webp
    - assets/saturn.webp
    - assets/stars.webp
    - assets/sun.webp
    - assets/uranus.webp
    - assets/venus.webp
    - assets/thumb/custom.webp
    - assets/thumb/earth.webp
    - assets/thumb/jupiter.webp
    - assets/thumb/mars.webp
    - assets/thumb/mercury.webp
    - assets/thumb/moon.webp
    - assets/thumb/neptune.webp
    - assets/thumb/saturn.webp
    - assets/thumb/stars.webp
    - assets/thumb/sun.webp
    - assets/thumb/uranus.webp
    - assets/thumb/venus.webp
