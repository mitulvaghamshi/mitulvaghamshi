    <style>
        :root {
            color-scheme: light dark;
            --display: flex;
            --radius: 50px;
            --padding: 20px;
            --font-size: 2em;
            --item-width: auto;
            --table-width: 400px;
            --primary: #FF644C;
            --secondary: #219f69;
        }

        @media (prefers-color-scheme:dark) {
            :root {
                --primary: #dc4d62;
                --secondary: #49c690;
            }
        }

        body {
            margin: auto;
            padding: var(--padding);
            font-size: var(--font-size);
        }

        header {
            margin: var(--padding);
            padding-top: var(--padding);
            padding-bottom: var(--padding);
            border-radius: var(--radius);
            outline: 2px dashed var(--secondary);
        }

        header>figure>img {
            width: 70vw;
            border-radius: var(--radius);
        }

        header>figure {
            text-align: center;
        }

        header>h1 {
            margin: 0.3em;
            text-align: center;
            color: var(--primary);
            font-size: calc(var(--font-size) + 1.5em);
        }

        header>h2 {
            text-align: center;
            color: var(--secondary);
        }

        main>article {
            flex-wrap: wrap;
            justify-content: center;
            display: var(--display);
        }

        hr {
            height: 12px;
            border: none;
            margin: var(--padding);
            border-radius: var(--radius);
            outline: 2px dashed var(--primary);
        }

        section>div {
            text-align: center;
            color: whitesmoke;
            margin: var(--padding);
            padding: var(--padding);
            border-radius: var(--radius);
            background-color: var(--primary);
        }

        section>div:hover {
            background-color: var(--secondary);
        }

        table {
            margin: var(--padding);
            padding: var(--padding);
            min-width: var(--table-width);
            border-radius: var(--radius);
            outline: 1px solid var(--primary);
        }

        table:hover {
            outline: none;
            background-color: var(--secondary);
        }

        table>tr {
            display: var(--display);
            width: var(--item-width);
            justify-content: space-between;
        }

        footer {
            font-weight: bold;
            text-align: center;
            margin: var(--padding);
            padding: var(--padding);
            border-radius: var(--radius);
            outline: 2px dashed var(--secondary);
        }

        footer>p {
            color: var(--primary);
            font-size: calc(var(--font-size) - 0.6em);
        }

        footer>span {
            font-size: calc(var(--font-size) - 0.7em);
        }

        @media(max-width:640px) {
            :root {
                --table-width: auto;
                --radius: 30px;
                --padding: 14px;
                --font-size: 1.6em;
                --item-width: calc(100vw - var(--padding)*6);
            }
        }

        @media(max-width:460px) {
            :root {
                --radius: 20px;
                --padding: 12px;
                --font-size: 1.3em;
            }
        }

        @media(max-width:350px) {
            :root {
                --radius: 12px;
                --padding: 8px;
                --font-size: auto;
            }
        }
    </style>

<body>

            <span>Copyright &copy;

    </article>
</body>

ame": "પનીર ટીક્કા મસાલા", "price": "160" }, { "name": "પનીર અંગારા", "price": "180" }, { "name": "પનીર હાંડી", "price": "170" }, { "name": "કાજુ મસાલા", "price": "170" }, { "name": "કાજુ કરી", "price": "160" }, { "name": "ડાંકાવાલા ગ્રીન & રેડ", "price": "200" }] }, { "name": "કાઠિયાવાડી કહુંબો", "items": [{ "name": "ભરેલા રીંગણ", "price": "80" }, { "name": "લસણીયા બટેકા", "price": "80" }, { "name": "સેવ ટમેટા", "price": "75" }, { "name": "મિક્સ વેજ", "price": "80" }, { "name": "દહીં તીખારી", "price": "60" }, { "name": "દેશી ચણામસાલા", "price": "80" }, { "name": "કાજુ ગાંઠિયા", "price": "120" }, { "name": "રીંગણ નુ ભરથુ", "price": "80" }, { "name": "કાજુ કારેલા", "price": "100" }, { "name": "પાપડ કારેલા", "price": "90" }, { "name": "સેવ લસણ", "price": "80" }, { "name": "લસણીયા મગ", "price": "80" }, { "name": "સેવ સીંગ ભજીયા", "price": "90" }, { "name": "કસ્તુરી બુંદી", "price": "80" }] }, { "name": "કાઠિયાવાડી કહુંબો (સીઝનલ)", "items": [{ "name": "તુવેર ઠોઠા", "price": "90" }, { "name": "લીલા ચણા", "price": "90" }, { "name": "લીલી હળદળ", "price": "150" }, { "name": "ગ્રીન સેવ લસણ", "price": "100" }, { "name": "મેથી લસણીયા બટાકા", "price": "90" }, { "name": "મેથી પાપડ", "price": "90" }, { "name": "તુવેર મેથી", "price": "90" }] }, { "name": "સ્પેશિયલ", "items": [{ "name": "ચીઝ મસાલા રોટલો", "price": "130" }] }] };

            const table = document.createElement("table");
            group.items.forEach((dish) => {
                const row = document.createElement("tr");
                const name = document.createElement("td");
                name.innerText = dish.name;
                row.appendChild(name);
                const price = document.createElement("td");
                price.innerText = `₹ ${dish.price}`;
                row.appendChild(price);
                table.appendChild(row);
            });
            const groupName = document.createElement("div");
            groupName.innerText = group.name;
            const section = document.createElement("section");
            section.appendChild(groupName);
            section.appendChild(table);
            container.appendChild(section);
        });
    };
</script>
