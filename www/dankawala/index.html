    <style>
        :root {
            color-scheme: light dark;
            --display: flex;
            --radius: 8px;
            --padding: 20px;
            --font-size: 2em;
            --min-width: 400px;
            --item-width: auto;
            --primary-color: #FF644C;
            --secondary-color: #219f69;
        }

        @media (prefers-color-scheme:dark) {
            :root {
                --primary-color: #dc4d62;
                --secondary-color: #49c690;
            }
        }

        body {
            margin: auto;
            padding: var(--padding);
            font-size: var(--font-size);
        }

        main>figure {
            text-align: center;
        }

        figure>img {
            width: 70vw;
            border-radius: var(--radius);
        }

        main>h1 {
            margin: 0.3em;
            color: var(--primary-color);
            text-align: center;
            font-size: calc(var(--font-size) + 1.5em);
        }

        main>h2 {
            color: var(--secondary-color);
            text-align: center;
        }

        main>article {
            flex-wrap: wrap;
            justify-content: center;
            display: var(--display);
        }

        hr {
            height: 8px;
            border: none;
            border-radius: var(--radius);
            outline: 1px solid var(--primary-color);
        }

        section>div {
            padding: 5px;
            text-align: center;
            color: whitesmoke;
            margin: var(--padding);
            border-radius: var(--radius);
            background-color: var(--primary-color);
        }

        section>div:hover {
            background-color: var(--secondary-color);
        }

        table {
            margin: var(--padding);
            padding: var(--padding);
            min-width: var(--min-width);
            border-radius: var(--radius);
        }

        table:hover {
            background-color: var(--secondary-color);
        }

        table>tr {
            display: flex;
            width: var(--item-width);
            justify-content: space-between;
        }

        footer {
            text-align: center;
        }

        footer>p {
            font-size: 0.7em;
            font-weight: bold;
            color: var(--primary-color);
        }

        footer>span {
            font-size: 0.5em;
            font-weight: bold;
        }

        @media only screen and (max-width:600px) {
            :root {
                --display: flexbox;
                --min-width: auto;
                --font-size: 1.5em;
                --padding: 20px;
                --radius: 20px;
                --item-width: calc(100vw - var(--padding) * 6);

        }

        @media only screen and (max-width:450px) {

                --display: flexbox;
                --min-width: auto;

            const table = document.createElement("table");
            group.items.forEach((dish) => {
                const row = document.createElement("tr");
                const name = document.createElement("td");
                name.innerText = dish.name;
                row.appendChild(name);
                const price = document.createElement("td");

                row.appendChild(price);
                table.appendChild(row);
            });

            const section = document.createElement("section");
            section.appendChild(groupName);
            section.appendChild(table);
            container.appendChild(section);
