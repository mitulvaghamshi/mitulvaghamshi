    <style>
        :root {
            color-scheme: light dark;

            --display: flex;
            --radius: 30px;
            --padding: 20px;
            --font-size: 2em;
            --table-width: 400px;

            --primary: #FF644C;
            --secondary: #219f69;
            --background: #f4f5ff;
        }

        @media (prefers-color-scheme:dark) {
            :root {
                --primary: #dc4d62;
                --secondary: #49c690;
                --background: #2b2b2b;
            }
        }

        body {
            margin: auto;
            padding: var(--padding);
            font-size: var(--font-size);
            background-color: var(--background);
        }

        header,
        footer {
            text-align: center;
            margin: var(--padding);
            padding: var(--padding);
            border-radius: var(--radius);
            outline: 2px solid var(--secondary);
        }

        header>figure>img {
            width: 60vw;
        }

        header>h1 {
            margin: 0.3em;
            color: var(--primary);
            font-size: calc(var(--font-size) + 1em);
        }

        header>h2 {
            color: var(--secondary);
        }

        main>article {
            flex-wrap: wrap;
            display: var(--display);
            justify-content: space-evenly;
        }

        section {
            margin: var(--padding);
            border-radius: var(--radius);
            outline: 2px solid var(--primary);
        }

        section>div {
            text-align: center;
            color: whitesmoke;
            padding: var(--padding);
            border-radius: var(--radius) var(--radius) 0 0;
            background-color: var(--primary);
        }

        section:hover {
            border-radius: var(--radius) var(--radius) 0 0;
        }

        table {
            padding: var(--padding);
            min-width: var(--table-width);
            border-radius: 0 0 var(--radius) var(--radius);
        }

        table>tr {
            justify-content: space-between;
        }

        table>tr>td:nth-child(2) {
            width: 80px;
        }

        footer {
            font-size: 0.7em;
            font-weight: bold;
            text-align: center;
        }

        footer>span {
            color: var(--primary);
        }

        footer>p {
            margin: var(--padding);
        }

        @media(max-width:740px) {
            :root {
                --padding: 12px;
                --font-size: 1.3em;
                --table-width: 300px;
            }

            table>tr>td:nth-child(2) {
                width: 70px;
            }
        }

        @media(max-width:678px) {
            :root {
                --font-size: 1.6em;
                --table-width: calc(90vw - var(--padding));
            }
        }

        @media(max-width:420px) {
            :root {
                --font-size: 1.3em;
            }
        }

        @media(max-width:320px) {
            :root {
                --font-size: auto;
                --item-width: auto;
            }
        }
    </style>
</head>

<body>
    <article>

            <h1>ડંકાવાલા કાઠીયાવાડી</h1>
            <h2>ગાર્ડન રેસ્ટોરન્ટ મેનુ</h2>

        <main>

        <footer>

            <p>Copyright &copy; 2024, Dankawala. All Rights Reserved.</p>
        </footer>
    </article>
</body>

<script>

ame": "પનીર ટીક્કા મસાલા", "price": "160" }, { "name": "પનીર અંગારા", "price": "180" }, { "name": "પનીર હાંડી", "price": "170" }, { "name": "કાજુ મસાલા", "price": "170" }, { "name": "કાજુ કરી", "price": "160" }, { "name": "ડાંકાવાલા ગ્રીન & રેડ", "price": "200" }] }, { "name": "કાઠિયાવાડી કહુંબો", "items": [{ "name": "ભરેલા રીંગણ", "price": "80" }, { "name": "લસણીયા બટેકા", "price": "80" }, { "name": "સેવ ટમેટા", "price": "75" }, { "name": "મિક્સ વેજ", "price": "80" }, { "name": "દહીં તીખારી", "price": "60" }, { "name": "દેશી ચણામસાલા", "price": "80" }, { "name": "કાજુ ગાંઠિયા", "price": "120" }, { "name": "રીંગણ નુ ભરથુ", "price": "80" }, { "name": "કાજુ કારેલા", "price": "100" }, { "name": "પાપડ કારેલા", "price": "90" }, { "name": "સેવ લસણ", "price": "80" }, { "name": "લસણીયા મગ", "price": "80" }, { "name": "સેવ સીંગ ભજીયા", "price": "90" }, { "name": "કસ્તુરી બુંદી", "price": "80" }] }, { "name": "કાઠિયાવાડી કહુંબો (સીઝનલ)", "items": [{ "name": "તુવેર ઠોઠા", "price": "90" }, { "name": "લીલા ચણા", "price": "90" }, { "name": "લીલી હળદળ", "price": "150" }, { "name": "ગ્રીન સેવ લસણ", "price": "100" }, { "name": "મેથી લસણીયા બટાકા", "price": "90" }, { "name": "મેથી પાપડ", "price": "90" }, { "name": "તુવેર મેથી", "price": "90" }] }, { "name": "સ્પેશિયલ", "items": [{ "name": "ચીઝ મસાલા રોટલો", "price": "130" }] }] };

            const table = document.createElement("table");
            group.items.forEach((dish) => {
                const row = document.createElement("tr");
                const name = document.createElement("td");
                name.innerText = dish.name;
                row.appendChild(name);
                const price = document.createElement("td");
                price.innerText = `₹ ${dish.price}`;
                row.appendChild(price);
                table.appendChild(row);
            });
            const groupName = document.createElement("div");
            groupName.innerText = group.name;
            const section = document.createElement("section");
            section.appendChild(groupName);
            section.appendChild(table);
            container.appendChild(section);
        });
    };
</script>
